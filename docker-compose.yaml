services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - go2rtc

  certbot:
    image: certbot/certbot
    container_name: certbot
    #user: root  # Maybe needed! Ensures permission to write to volumes and use docker.sock
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    # Certificate renewal check incl. a "deploy-hook" that reloads NGINX
    entrypoint: >
      /bin/sh -c "trap exit TERM; 
      while :; do 
        certbot renew --webroot --webroot-path=/var/www/certbot --deploy-hook 'docker exec nginx_proxy nginx -s reload'; 
        sleep 12h & wait $${!}; 
      done;"

  go2rtc:
    image: alexxit/go2rtc
    container_name: go2rtc
    restart: unless-stopped
    # No ports exposed! It stays private inside the docker network.
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml