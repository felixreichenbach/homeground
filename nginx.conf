events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name yourdomain.com;

        # Path for Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
         # Change to "listen 443 ssl;" after receiving the certificates
        listen 443 ssl;
        server_name yourdomain.com;
        # Activate SSL (Uncomment after obtaining certificates)
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

        # WebSocket Support (Required for go2rtc)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Real IP Forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        location / {
            # Basic Authentication for anything else
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # Proxy to the go2rtc container
            proxy_pass http://go2rtc:1984;
        }
        
        location /stream.html {
            # Token-based authentication for the stream endpoints
            if ($arg_token != "YOUR_SECURE_TOKEN_HERE") {
                return 403;
            }
            # Proxy to the go2rtc container
            proxy_pass http://go2rtc:1984/stream.html;
        }

        location /video-stream.js {
            auth_basic off; # Disable auth for the JS file
            proxy_pass http://go2rtc:1984;
        }

        location /video-rtc.js {
            auth_basic off; # Disable auth for the JS file
            proxy_pass http://go2rtc:1984;
        }

        location /api/ws {
            proxy_pass http://go2rtc:1984/api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}